<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h2>💳 Fraud Detection System</h2>

    <label>Amount:</label>
    <input id="amount" type="number" value="100"><br>

    <button onclick="predict()">Check Transaction</button>

    <h3 id="result"></h3>

    <script>
        async function predict() {

            const data = {
                Time: 0,
                Amount: parseFloat(document.getElementById("amount").value),
                V1: 0, V2: 0, V3: 0, V4: 0, V5: 0, V6: 0,
                V7: 0, V8: 0, V9: 0, V10: 0, V11: 0, V12: 0,
                V13: 0, V14: 0, V15: 0, V16: 0, V17: 0, V18: 0,
                V19: 0, V20: 0, V21: 0, V22: 0, V23: 0, V24: 0,
                V25: 0, V26: 0, V27: 0, V28: 0
            };

            const response = await fetch("/predict", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.fraud) {
                document.getElementById("result").innerText = "🚨 Fraud Detected!";
            } else {
                document.getElementById("result").innerText = "✅ Safe Transaction";
            }
        }
    </script>

</body>
</html>
